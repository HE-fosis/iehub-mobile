<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Nunito:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    /* Standardized height logic to prevent scrolling */
    height: 100vh;
    background: transparent;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    -webkit-font-smoothing: antialiased;
    overflow: hidden; 
  }

  /* Optimized Icon Layer */
  .icon-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
    overflow: hidden;
  }

  .floating-icon {
    position: absolute;
    fill: #ECA400;
    opacity: 0.05;
    animation: slowDrift 22s infinite ease-in-out alternate;
  }

  .i1 { width: 100px; top: 10%; left: 10%; } 
  .i2 { width: 80px; top: 15%; right: 12%; animation-delay: -4s; } 
  .i3 { width: 100px; bottom: 18%; left: 8%; animation-delay: -7s; } 
  .i4 { width: 90px; bottom: 12%; right: 10%; animation-delay: -2s; }

  @keyframes slowDrift {
    0% { transform: translate3d(0, 0, 0) rotate(0deg); }
    100% { transform: translate3d(20px, -25px, 0) rotate(8deg); }
  }

  .hero-container {
    width: 100%;
    max-width: 1200px;
    /* Standardized padding to match Leadership and Finance */
    padding: 20px 15px 10px 15px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
  }

  h1 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    color: #ffffff;
    text-transform: uppercase;
    font-size: clamp(2rem, 10vw, 5.5rem); 
    line-height: 0.95;
    margin: 0 0 10px 0;
    letter-spacing: -1px;
    text-shadow: 0 10px 25px rgba(0,0,0,0.4);
    width: 100%;
  }

  h1 span {
    display: block;
  }

  .swipe-zone {
    margin: 5px 0 25px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .chevron {
    width: 12px;
    height: 12px;
    border-right: 3px solid #ECA400;
    border-bottom: 3px solid #ECA400;
    transform: rotate(45deg);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { transform: rotate(45deg) translate(-5px, -5px); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: rotate(45deg) translate(5px, 5px); opacity: 0; }
  }

  .swipe-text {
    color: #ECA400;
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  .verse-content {
    width: 100%;
    max-width: 800px;
    padding-bottom: 20px;
  }

  .arabic {
    font-size: clamp(1.1rem, 3vw, 1.6rem);
    color: #ECA400;
    margin-bottom: 12px;
    display: block;
    line-height: 1.7;
    direction: rtl;
  }

  .translation {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(0.9rem, 2vw, 1.2rem);
    color: rgba(255, 255, 255, 0.85);
    line-height: 1.6;
    margin: 0 auto 10px auto;
  }

  .citation {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    color: rgba(234, 164, 0, 0.5);
    text-transform: uppercase;
    letter-spacing: 5px;
  }

  @media (min-width: 1024px) {
    .hero-container { padding-top: 40px; }
    h1 { letter-spacing: -3px; line-height: 0.85; margin-bottom: 20px; }
    .swipe-zone { margin-top: 20px; }
  }

  @media (max-width: 480px) {
    .floating-icon { display: none; }
  }
</style>
</head>
<body>

  <div class="icon-canvas">
    <svg class="floating-icon i3" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    <svg class="floating-icon i2" viewBox="0 0 24 24"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.5h-2v3h2V1zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.75l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zm-6.24 4.34h2v-3h-2v3zM11 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm8 3.5h3v2h-3v-2zM5.84 15.14l-1.79 1.79 1.41 1.41 1.79-1.79-1.41-1.41z"/></svg>
    <svg class="floating-icon i4" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
    <svg class="floating-icon i1" viewBox="0 0 24 24"><path d="M12 22c-5.52 0-10-4.48-10-10 0-4.75 3.31-8.72 7.75-9.74.81-.19 1.62-.26 2.25-.26 3.86 0 7 3.14 7 7 0 2.28-1.09 4.31-2.78 5.6l-1.71 1.3c-.33.25-.51.64-.51 1.05V22h-2v-5.05c0-.41-.18-.8-.51-1.05l-1.71-1.3C10.09 13.31 9 11.28 9 9c0-3.86 3.14-7 7-7 .63 0 1.44.07 2.25.26 4.44 1.02 7.75 4.99 7.75 9.74 0 5.52-4.48 10-10 10z"/></svg>
  </div>

  <div class="hero-container" id="fosis-tarbiyyah-unit">
    <h1>
      <span>Tarbiyyah</span>
      <span>& Wellness</span>
    </h1>
    
    <div class="swipe-zone">
      <div class="chevron"></div>
      <div class="swipe-text">EXPLORE</div>
    </div>

    <div class="verse-content">
      <span class="arabic">قَدْ أَفْلَحَ مَن زَكَّاهَا وَقَدْ خَابَ مَن دَسَّاهَا</span>
      <p class="translation">"He has certainly succeeded who purifies his soul, and he has certainly failed who corrupts it."</p>
      <div class="citation">Surah Ash-Shams 91:9-10</div>
    </div>
  </div>

  <script>
    function sendHeight() {
      const unit = document.getElementById('fosis-tarbiyyah-unit');
      if (unit) {
        window.parent.postMessage({ sentinel: 'amp', type: 'embed-size', height: unit.offsetHeight }, '*');
      }
    }
    window.onload = sendHeight;
    window.onresize = sendHeight;
    setTimeout(sendHeight, 1500);
  </script>

</body>
</html>
