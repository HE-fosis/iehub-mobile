<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOSIS | ISoc Essentials Hub</title>
    <script type="text/javascript">
        function smartRedirect() {
            // THE DESTINATIONS
            const mobileSite = "https://sites.google.com/fosis.org.uk/iehub-mobile";
            const desktopSite = "https://sites.google.com/fosis.org.uk/isocessentials";

            // 1. Detect if it's a mobile device via User Agent
            const isMobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            // 2. Detect via screen width (Standard for high-res phones)
            const isSmallScreen = window.innerWidth <= 1024;

            // 3. Execute Redirect
            if (isMobileUA || isSmallScreen) {
                window.location.replace(mobileSite);
            } else {
                window.location.replace(desktopSite);
            }
        }

        // Run immediately
        smartRedirect();
    </script>
    <style>
        body { background: #00203F; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #ECA400; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader" style="margin: 0 auto 15px;"></div>
        <p style="letter-spacing: 2px; font-size: 10px; font-weight: bold; text-transform: uppercase; opacity: 0.8;">Loading Hub Experience...</p>
    </div>
</body>
</html>
