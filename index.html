<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FOSIS | ISoc Essentials Hub</title>
    <script type="text/javascript">
        function smartRedirect() {
            const mobileSite = "https://sites.google.com/fosis.org.uk/iehub-mobile/soon-alumni-community";
            const desktopSite = "https://sites.google.com/fosis.org.uk/isocessentials/tarbiyyah-wellness";

            // 1. Check for Mobile Device Identity (Most reliable)
            const isMobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            // 2. Check for Touch Capability
            const hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

            // 3. Check Screen Width (Standard fallback)
            const isSmallScreen = window.innerWidth <= 1024;

            // Decision Logic: If it looks like a phone OR acts like a phone, send to Mobile
            if (isMobileUA || (hasTouch && isSmallScreen)) {
                window.location.replace(mobileSite);
            } else {
                window.location.replace(desktopSite);
            }
        }

        // Execute immediately
        smartRedirect();
    </script>
    
    <style>
        body { background: #00203F; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <p>Loading the IE Hub Experience...</p>
    </div>
</body>
</html>
