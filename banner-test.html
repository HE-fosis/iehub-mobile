<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
    :root {
        --brand-orange: #ECA400; 
        --brand-white: #FFFFFF; 
    }

    body, html { 
        margin: 0; padding: 0; 
        width: 100%; height: 100vh;
        overflow: hidden;
        background-color: #000;
        font-family: 'Montserrat', sans-serif;
    }

    /* THE HD ENGINE */
    .carousel-container {
        position: absolute;
        width: 100%; height: 100%;
        z-index: 1;
    }

    .slide {
        position: absolute;
        width: 100%; height: 100%;
        background-size: cover;
        background-position: center center;
        opacity: 0;
        /* Much slower, smoother transition */
        transition: opacity 3s ease-in-out; 
        /* Forces HD Rendering */
        image-rendering: -webkit-optimize-contrast; 
    }

    .slide.active { opacity: 1; }

    /* DARK OVERLAY (Replaces the "Blurry" Filter) */
    .overlay-tint {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.4); /* Just enough to see text, but images stay HD */
        z-index: 5;
    }

    .content {
        position: relative;
        z-index: 10;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: var(--brand-white);
        text-shadow: 0px 2px 15px rgba(0,0,0,0.8);
    }

    .eyebrow {
        font-weight: 700;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 12px;
        color: var(--brand-orange);
        margin-bottom: 20px;
    }

    .title-top {
        display: block;
        font-weight: 900;
        font-size: 4rem;
        letter-spacing: 8px;
    }

    .title-bottom {
        display: block;
        font-weight: 400;
        font-size: 2.8rem;
        letter-spacing: 28px;
        color: var(--brand-orange);
        text-indent: 28px;
        margin-top: 5px;
    }

    .quote {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: 1.5rem;
        max-width: 800px;
        margin: 30px 0;
    }

    .footer-bar {
        margin-top: 50px;
        padding-top: 20px;
        width: 40%;
        border-top: 2px solid var(--brand-orange);
        color: var(--brand-orange);
        font-family: 'Playfair Display', serif;
        font-size: 1.2rem;
    }
</style>
</head>
<body>

<div class="carousel-container">
    <div class="slide active" style="background-image: url('https://i.ibb.co/GvkFc1vh/Screenshot-2026-04-16-at-15-49-11.jpg');"></div>
    <div class="slide" style="background-image: url('https://i.ibb.co/nNZdh9BP/image.jpg');"></div>
    <div class="slide" style="background-image: url('https://i.ibb.co/KxgyCNrh/image.jpg');"></div>
</div>

<div class="overlay-tint"></div>

<div class="content">
    <span class="eyebrow">The National Standard</span>
    <h1 class="main-title">
        <span class="title-top">ISoc Essentials</span>
        <span class="title-bottom">HUB</span>
    </h1>
    <p class="quote">&ldquo;To serve the Muslim students is to serve the future of the Ummah&rdquo;</p>
    <div class="footer-bar">Built for the next generation of leadership</div>
</div>

<script>
    const slides = document.querySelectorAll('.slide');
    let i = 0;
    function cycle() {
        slides[i].classList.remove('active');
        i = (i + 1) % slides.length;
        slides[index = i].classList.add('active');
    }
    setInterval(cycle, 8000); // 8 seconds per image
</script>

</body>
</html>
