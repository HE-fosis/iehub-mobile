<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Nunito:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100vh; /* Ensures it covers the screen */
    background-color: #00203F; /* FOSIS Navy Background */
    display: flex;
    flex-direction: column;
    justify-content: center; /* Centers content vertically */
    align-items: center;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden; 
    overflow-y: auto; /* FIX: Allows scrolling if the screen is small! */
  }

  /* Background Icons Layer */
  .icon-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .floating-icon {
    position: absolute;
    fill: #ECA400; /* FOSIS Gold */
    opacity: 0.08; /* Slightly more visible against the dark blue */
    will-change: transform;
    animation: slowDrift 20s infinite ease-in-out alternate;
  }

  /* Optimized sizing and placement */
  .i1 { width: 100px; top: 8%; left: 7%; } /* Brotherhood */
  .i2 { width: 70px; top: 12%; right: 12%; animation-delay: -3.5s; } /* Grad Cap */
  .i3 { width: 110px; bottom: 12%; left: 10%; animation-delay: -7s; } /* Network */

  @keyframes slowDrift {
    0% { transform: translate3d(0, 0, 0) rotate(0deg); }
    100% { transform: translate3d(15px, -20px, 0) rotate(5deg); }
  }

  .hero-container {
    width: 95%;
    max-width: 1300px;
    padding: 40px 15px; 
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
    position: relative;
  }

  h1 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    color: #ffffff;
    text-transform: uppercase;
    font-size: clamp(2.5rem, 10vw, 5.5rem); 
    line-height: 0.95; 
    margin: 0 0 15px 0;
    letter-spacing: -2px;
    text-shadow: 0 10px 25px rgba(0,0,0,0.5);
    width: 100%;
  }

  h1 span {
    display: block;
  }

  .swipe-zone {
    margin: 15px 0 25px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .chevron {
    width: 12px; 
    height: 12px; 
    border-right: 3px solid #ECA400; /* FOSIS Gold */
    border-bottom: 3px solid #ECA400; /* FOSIS Gold */
    transform: rotate(45deg);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { transform: rotate(45deg) translate(-3px, -3px); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: rotate(45deg) translate(3px, 3px); opacity: 0; }
  }

  .swipe-text {
    color: #ECA400; /* FOSIS Gold */
    font-family: 'Montserrat', sans-serif;
    font-size: 10px; 
    font-weight: 800;
    letter-spacing: 2px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  .verse-content {
    width: 100%;
    max-width: 850px;
  }

  .arabic {
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    color: #ECA400; /* FOSIS Gold */
    margin-bottom: 15px;
    display: block;
    line-height: 1.8;
    direction: rtl; 
  }

  .translation {
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    font-size: clamp(0.95rem, 2vw, 1.1rem);
    color: rgba(255, 255, 255, 0.9);
    line-height: 1.6;
    margin: 0 auto 15px auto;
  }

  .citation {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    color: rgba(236, 164, 0, 0.7); /* Muted FOSIS Gold */
    text-transform: uppercase;
    letter-spacing: 4px;
  }

  @media (min-width: 1024px) {
    h1 { line-height: 0.9; margin-bottom: 20px; }
  }

  @media (max-width: 480px) {
    .floating-icon { display: none; }
    h1 { letter-spacing: -1px; }
  }
</style>
</head>
<body>

  <div class="icon-canvas">
    <svg class="floating-icon i1" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 3-1.34 3-3S9.66 5 8 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
    <svg class="floating-icon i2" viewBox="0 0 24 24"><path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg>
    <svg class="floating-icon i3" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
  </div>

  <div class="hero-container" id="fosis-alumni-banner">
    <h1>
      <span>Alumni</span>
      <span>& Community</span>
    </h1>
    
    <div class="swipe-zone">
      <div class="chevron"></div>
      <div class="swipe-text">SCROLL</div>
    </div>

    <div class="verse-content">
      <span class="arabic">إِنَّمَا ٱلْمُؤْمِنُونَ إِخْوَةٌ فَأَصْلِحُوا بَيْنَ أَخَوَيْكُمْ ۚ وَٱتَّقُوا ٱللَّهَ لَعَلَّكُمْ تُرْحَمُونَ</span>
      <p class="translation">"The believers are but one brotherhood, so make peace between your brothers. And be mindful of Allah so you may be shown mercy."</p>
      <div class="citation">Surah Al-Hujurat 49:10</div>
    </div>
  </div>

  <script>
    function sendHeight() {
      const unit = document.getElementById('fosis-alumni-banner');
      if (unit) {
        window.parent.postMessage({ sentinel: 'amp', type: 'embed-size', height: unit.offsetHeight + 60 }, '*');
      }
    }
    window.onload = sendHeight;
    window.onresize = sendHeight;
    setTimeout(sendHeight, 500);
    setTimeout(sendHeight, 1500);
  </script>

</body>
</html>
